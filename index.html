<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Loading...</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Libre+Franklin:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="nav" id="mainNav">
        <a href="#" class="nav__logo" id="navLogo">
            <span class="nav__wordmark" id="navWordmark"></span>
            <span class="nav__descriptor" id="navDescriptor"></span>
        </a>
        <ul class="nav__right" id="navLinks">
            <li class="nav__link-item"><a href="#contact" class="ghost-btn nav__contact-btn">Contact</a></li>
            <li class="nav__link-item"><a href="#" class="nav__phone" id="navPhone"></a></li>
            <li>
                <button class="nav__hamburger" id="menuToggle" aria-label="Open menu">
                    <span></span><span></span><span></span>
                </button>
            </li>
        </ul>
    </nav>

    <div class="mobile-menu" id="mobileMenu">
        <button class="mobile-menu__close" id="menuClose" aria-label="Close menu">&times;</button>
        <div id="mobileMenuLinks"></div>
    </div>

    <section class="hero">
        <div class="hero__media">
            <img class="hero__img" id="heroImg" src="" alt="" loading="eager">
        </div>
        <div class="hero__overlay"></div>
        <div class="hero__grain"></div>

        <div class="hero__content">
            <div class="hero__rule"></div>
            <span class="hero__eyebrow" id="heroEyebrow"></span>
            <h1 class="hero__title" id="heroTitle"></h1>
            <p class="hero__description" id="heroDescription"></p>
            <div class="estimator">
                <div class="estimator__field">
                    <input class="estimator__input" type="text" id="heroEstimatorInput"
                           placeholder="" aria-label="Property address for project estimate">
                    <div class="estimator__accent"></div>
                </div>
                <button class="estimator__btn" id="heroEstimatorBtn"></button>
            </div>
            <span class="estimator__label" id="heroEstimatorLabel"></span>
        </div>

        <div class="hero__scroll">
            <span class="hero__scroll-label">Scroll</span>
            <div class="hero__scroll-bar"></div>
        </div>
    </section>

    <section class="stats">
        <div class="stats__inner" id="statsInner"></div>
    </section>

    <section class="services" id="services">
        <div class="services__inner">
            <div class="services__header reveal">
                <span class="section-eyebrow" id="servicesEyebrow"></span>
                <h2 class="section-heading" id="servicesHeading"></h2>
            </div>
            <div class="services__grid" id="servicesGrid"></div>
        </div>
    </section>

    <section class="portfolio" id="portfolio">
        <div class="portfolio__inner">
            <div class="portfolio__header">
                <div class="reveal">
                    <span class="section-eyebrow" id="portfolioEyebrow"></span>
                    <h2 class="section-heading" id="portfolioHeading"></h2>
                </div>
                <a href="#" class="ghost-btn reveal" id="portfolioViewAll" style="--d:1"></a>
            </div>
            <div class="portfolio__grid" id="portfolioGrid"></div>
        </div>
    </section>

    <section class="quote" id="about">
        <div class="quote__inner reveal">
            <div class="quote__mark">&ldquo;</div>
            <p class="quote__text" id="quoteText"></p>
            <div class="quote__rule"></div>
            <span class="quote__author" id="quoteAuthor"></span>
            <span class="quote__location" id="quoteLocation"></span>
        </div>
    </section>

    <section class="cta" id="contact">
        <div class="cta__inner reveal">
            <h2 class="cta__heading" id="ctaHeading"></h2>
            <p class="cta__desc" id="ctaDesc"></p>
            <div class="estimator estimator--static">
                <div class="estimator__field">
                    <input class="estimator__input" type="text" id="ctaEstimatorInput"
                           placeholder="" aria-label="Property address for consultation">
                    <div class="estimator__accent"></div>
                </div>
                <button class="estimator__btn" id="ctaEstimatorBtn"></button>
            </div>
            <span class="cta__phone" id="ctaPhone"></span>
        </div>
    </section>

    <footer class="footer">
        <div class="footer__inner">
            <div>
                <div class="footer__brand-name" id="footerBrandName"></div>
                <p class="footer__brand-desc" id="footerBrandDesc"></p>
            </div>
            <div class="footer__col">
                <h4 class="footer__col-title">Sitemap</h4>
                <ul id="footerSitemap"></ul>
            </div>
            <div class="footer__col">
                <h4 class="footer__col-title">Services</h4>
                <ul id="footerServices"></ul>
            </div>
            <div class="footer__col">
                <h4 class="footer__col-title">Contact</h4>
                <ul id="footerContact"></ul>
            </div>
        </div>
        <div class="footer__bottom">
            <span class="footer__copyright" id="footerCopyright"></span>
            <div class="footer__legal" id="footerLegal"></div>
        </div>
    </footer>

    <script src="client-config.js"></script>
    <script src="main.js"></script>
</body>
</html>
